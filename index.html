<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nabung — Crypto Savings in Telegram</title>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <!-- Loading fallback: if JS never runs, this stays (not a black screen). React replaces it on mount. -->
    <div id="root">
      <div style="color:#8b93a1;font-family:-apple-system,Segoe UI,Roboto,sans-serif;padding:28px;text-align:center">
        Loading Nabung… 🐷
      </div>
    </div>
    <!-- Visible error catcher: turns a silent black screen into a readable message. -->
    <div id="err" style="display:none;color:#f87171;background:#0f1115;font-family:monospace;font-size:12px;padding:16px;white-space:pre-wrap;position:fixed;inset:0;overflow:auto;z-index:9999"></div>
    <script>
      (function () {
        function show(msg) {
          var d = document.getElementById("err");
          if (d) { d.style.display = "block"; d.textContent = "Nabung error:\n" + msg; }
        }
        window.addEventListener("error", function (e) {
          show((e.message || "") + "\n" + ((e.error && e.error.stack) || ""));
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason; show("Unhandled promise: " + ((r && (r.stack || r.message)) || String(r)));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
